{% load static %}
<header class="bg-green-900 text-white py-2">
    <div class="container mx-auto flex justify-between items-center px-4">
        <h1 class="text-xl">{{title}} {{user}}</h1>
        <a href="/accounts/logout/" id="link-logout" class="underline justify-flex-end">Logout</a>
    </div>
</header>
<script>
    window.addEventListener('keydown', (event) => {
        if (event.keyCode === 76 && event.target.tagName.toLowerCase() !== 'textarea') {
            document.getElementById('link-logout').click();
        }
    });
</script>
