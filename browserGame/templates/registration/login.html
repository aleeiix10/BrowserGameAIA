{% extends 'base.html' %}
{% load static %}
{% load render_bundle from webpack_loader %}
{% block title %} Login {% endblock %}
{% block content %}

<div class="flex flex-col items-center justify-center min-h-screen bg-green-300">
    <div class="w-full max-w-md">
        <h1 class="text-4xl text-green-900 font-bold p-10 text-center">Iniciar Sessió</h1>
        <form class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4" id="login-form" method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2" for="username">
                    Nom d'usuari
                </label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="username" type="text" placeholder="Usuari" name="username">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 font-bold mb-2" for="password">
                    Contrasenya
                </label>
                <input class="shadow appearance-none border border-red-500 rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline" id="password" type="password" placeholder="*********" name="password">
            </div>
            <div class="flex flex-col sm:flex-row items-center justify-between">
                <button class="bg-green-700 hover:bg-green-600 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline mb-4 sm:mb-0" type="submit">
                    Iniciar sessió
                </button>
                <a class="inline-block align-baseline font-bold text-sm text-green-700 hover:text-green-600" id="link-password" href="{% url 'password_reset' %}">
                    ¿Has oblidat la contrasenya?
                </a>
            </div>
        </form>
        <p class="text-center text-gray-500 text-xs">
            &copy;2023 Pren arrels
        </p>
    </div>
</div>

<script>
    window.addEventListener('keydown', (event) => {
        if (event.keyCode === 13 && event.target.tagName.toLowerCase() !== 'textarea') {
            document.getElementById('login-form').submit();
        }
        if (event.keyCode === 72 && event.target.tagName.toLowerCase() !== 'textarea') {
            event.preventDefault();
            document.getElementById('link-password').click();
        }
    });
</script>

{% endblock %}
